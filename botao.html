<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Botao</title>
</head>

<style>
    html {
        height: 100%;

    }
    body{
        display: flex;
        justify-content: center;
        background-color : rgb(241, 201, 201);
        height: 100%;
    }
    button {
        width: 500px;
        height: 150px;
        background-color: antiquewhite;
    }
</style>

<body>
    <button id="botao" onclick="Pisca()">
        Meu botão
    </button>
    <script>
        function Pisca ()
        {
            var botao = document.getElementById ("botao")
            if (botao.style.backgroundColor == 'blue')
            {
                botao.style.backgroundColor = 'blue'
            }
            else
            {
                botao.style.backgroundColor = 'blue'
            }
        }
    </script>

    
</body>
</html>
